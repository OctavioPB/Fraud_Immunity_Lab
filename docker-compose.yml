version: "3.9"

# ============================================================
# Sovereign Fraud Immunity Lab — Local Dev Stack
# Usage: make up   (starts all services)
#        make down (stops + removes containers)
#        make seed (creates topics, indexes, graph constraints)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-local-dev-secret}
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    RED_TEAM_ENABLED: ${RED_TEAM_ENABLED:-true}
    SYNTHETIC_INJECTION_DRY_RUN: ${SYNTHETIC_INJECTION_DRY_RUN:-false}
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  volumes:
    - ./red_team/dags:/opt/airflow/dags
    - ./red_team/agents:/opt/airflow/plugins/agents
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - fraud_net

services:
  # ----------------------------------------------------------
  # Zookeeper
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    hostname: zookeeper
    container_name: fil_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud_net

  # ----------------------------------------------------------
  # Kafka
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: fil_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - fraud_net

  # ----------------------------------------------------------
  # Schema Registry
  # ----------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    hostname: schema-registry
    container_name: fil_schema_registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - fraud_net

  # ----------------------------------------------------------
  # PostgreSQL (Airflow metadata DB)
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: fil_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud_net

  # ----------------------------------------------------------
  # Redis (Celery broker + cache)
  # ----------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: fil_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud_net

  # ----------------------------------------------------------
  # Neo4j
  # ----------------------------------------------------------
  neo4j:
    image: neo4j:5.25-community
    container_name: fil_neo4j
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4j_local_dev}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - fraud_net

  # ----------------------------------------------------------
  # Airflow — DB init + admin user creation
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: fil_airflow_init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Fraud
          --lastname Immunity
          --role Admin
          --email admin@fraud-immunity.local
      "
    restart: on-failure

  # ----------------------------------------------------------
  # Airflow — Webserver
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: fil_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # Airflow — Scheduler
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: fil_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # FastAPI
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: fil_api
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_local_dev}
      REDIS_URL: redis://redis:6379/0
      API_SECRET_KEY: ${API_SECRET_KEY:-local-dev-secret-key-change-in-prod}
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_ALGORITHM: HS256
      RED_TEAM_ENABLED: ${RED_TEAM_ENABLED:-true}
      SYNTHETIC_INJECTION_DRY_RUN: ${SYNTHETIC_INJECTION_DRY_RUN:-false}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./api:/app/api
      - ./ml:/app/ml
    networks:
      - fraud_net
    restart: unless-stopped

  # ----------------------------------------------------------
  # Next.js Dashboard
  # ----------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../infra/Dockerfile.dashboard
    container_name: fil_dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fraud_net
    restart: unless-stopped

  # ----------------------------------------------------------
  # Seed runner (one-shot container)
  # ----------------------------------------------------------
  seed:
    image: python:3.11-slim
    container_name: fil_seed
    command: bash /scripts/seed.sh
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_local_dev}
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT:-us-east-1}
    volumes:
      - ./infra:/scripts
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - fraud_net
    profiles:
      - seed

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  airflow_logs:

networks:
  fraud_net:
    driver: bridge
