name: Credential Stuffing — Automated Account Takeover at Scale
version: "1.0.0"
attack_type: credential_stuffing
complexity: high
target_segment: retail_banking
description: >
  Automated attack using leaked username/password pairs from third-party
  breaches to authenticate into banking accounts. Distributed across thousands
  of residential IPs to evade per-IP rate limits. Successful logins are
  quickly harvested for account balance, followed by rapid cash-out.
evasion_tactics:
  - rotating_residential_proxies
  - low_request_rate_per_ip
  - headless_browser_fingerprinting
  - credential_pair_rotation
  - distributed_timing
expected_detection_signals:
  - password_spray_pattern
  - failed_login_velocity
  - new_device_multiple_accounts
  - behavioral_drift_login
  - ip_reputation_low
parameters:
  stuffing_attack:
    credential_pairs_tested: 50000
    success_rate: 0.002
    ip_pool_size: 5000
    requests_per_ip_per_hour: 3
  cash_out:
    time_to_first_transfer_minutes: 10
    p2p_transfer_amount_range_usd: [500, 2500]
    accounts_compromised: 100
tags:
  - credential_stuffing
  - account_takeover
  - automated_attack
  - botnet
