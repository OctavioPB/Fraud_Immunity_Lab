repos:
  # ----------------------------------------------------------
  # Standard pre-commit hooks
  # ----------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ----------------------------------------------------------
  # detect-secrets — blocks .env and credential commits
  # ----------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--baseline"
          - ".secrets.baseline"
        exclude: |
          (?x)^(
            .env.example|
            .*\.md|
            .*\.lock
          )$

  # ----------------------------------------------------------
  # Black — Python formatter
  # ----------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11

  # ----------------------------------------------------------
  # Ruff — Python linter (replaces flake8, isort, etc.)
  # ----------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]

  # ----------------------------------------------------------
  # Custom guard: synthetic fraud tag enforcement
  # Blocks any Python file that touches synthetic data
  # without the required {"synthetic": true} tag.
  # ----------------------------------------------------------
  - repo: local
    hooks:
      - id: no-env-commit
        name: Block .env file commits
        language: fail
        entry: "Refusing to commit .env — use .env.example instead"
        files: ^\.env$

      - id: synthetic-tag-check
        name: Verify synthetic data is tagged
        language: python
        entry: python infra/hooks/check_synthetic_tag.py
        files: ^(red_team|ingestion/producers)/.*\.py$
        pass_filenames: true
